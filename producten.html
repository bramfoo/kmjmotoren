<head>
  <meta charset="UTF-8" />

  <meta name="description" content="Bekijk het aanbod van KMJ Motoren – scooters, motoren en onderdelen." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <!-- Open Graph / social share preview -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="KMJ Motoren" />
  <meta property="og:title" content="Producten – KMJ Motoren" />
  <meta property="og:description" content="Bekijk het aanbod van KMJ Motoren – scooters, motoren en onderdelen." />
  <meta property="og:url" content="https://kmjmotoren.nl/producten.html" />
  <meta property="og:image" content="https://kmjmotoren.nl/assets/logo.png" />
  <meta property="og:image:width" content="1672" />
  <meta property="og:image:height" content="941" />
  <meta property="og:image:alt" content="KMJ Motoren" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Producten – KMJ Motoren" />
  <meta name="twitter:description" content="Bekijk het aanbod van KMJ Motoren – scooters, motoren en onderdelen." />
  <meta name="twitter:image" content="https://kmjmotoren.nl/assets/logo.png" />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css" />
  <script src="analytics.js"></script>
</head>
<body>

  <!-- NAV -->
  <header class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="logo"><img class="logo-img" src="assets/logo.svg" alt="KMJ Motoren" /></a>
      <button class="nav-toggle" aria-label="Menu openen" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <nav class="nav-links" id="nav-links">
        <a href="index.html#diensten">Diensten</a>
        <a href="beheer.html" class="admin-only">Dashboard</a>
        <a href="index.html#over-ons">Over ons</a>
        <a href="producten.html">Producten</a>
        <a href="socials.html">Socials</a>
        <a href="index.html#contact" class="btn btn-nav">Afspraak maken</a>
      </nav>
    </div>
  </header>

  <!-- PAGE HEADER -->
  <section class="subpage-head">
    <div class="container">
      <a href="index.html" class="back-link">&#8592; Terug naar home</a>
      <h1 class="section-title light">Onze producten</h1>
      <p class="section-sub light">Scooters, motoren en onderdelen uit ons aanbod.</p>
    </div>
  </section>

  <main class="subpage">
    <div class="container">

      <!-- ADMIN: add product -->
      <section class="admin-panel admin-only">
        <h2>Nieuw product toevoegen</h2>
        <form id="product-form" class="admin-form" novalidate>
          <div class="form-row">
            <div class="form-group">
              <label for="product-name">Naam *</label>
              <input type="text" id="product-name" placeholder="Bijv. Vespa Primavera 50" required />
            </div>
            <div class="form-group">
              <label for="product-price">Prijs (&euro;)</label>
              <input type="number" id="product-price" min="0" step="0.01" placeholder="Bijv. 2450" />
            </div>
          </div>
          <div class="form-group">
            <label for="product-desc">Beschrijving</label>
            <textarea id="product-desc" rows="3" placeholder="Bouwjaar, kilometerstand, staat…"></textarea>
          </div>
          <div class="form-group">
            <label for="product-image">Foto's (meerdere mogelijk)</label>
            <input type="file" id="product-image" accept="image/*,.heic,.heif" multiple />
          </div>
          <button type="submit" class="btn btn-primary">Product opslaan</button>
          <p class="form-notice" id="product-form-msg" aria-live="polite"></p>
        </form>
      </section>

      <!-- Product grid -->
      <div id="product-grid" class="product-grid"></div>
      <p id="product-empty" class="empty-state" hidden></p>

    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container footer-inner">
      <img class="footer-logo-img" src="assets/logo.svg" alt="KMJ Motoren" />
      <p>&copy; 2026 KMJ Motoren – Alle rechten voorbehouden</p>
    </div>
  </footer>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script src="producten.js"></script>
  <script src="main.js"></script>
</body>
</html>
